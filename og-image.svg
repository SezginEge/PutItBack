    </text>

    <rect x="176" width="160" height="48" rx="24" fill="none" stroke="rgba(255,255,255,0.14)"/>
    <text x="217" y="31" fill="rgba(255,255,255,0.72)" font-family="Lexend, Arial, sans-serif" font-size="20" font-weight="700">
