    </text>

    <rect x="354" width="164" height="48" rx="24" fill="none" stroke="rgba(255,255,255,0.14)"/>
    <text x="392" y="31" fill="rgba(255,255,255,0.72)" font-family="Lexend, Arial, sans-serif" font-size="20" font-weight="700">
