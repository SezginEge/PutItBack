  </text>
  <text x="110" y="334" fill="#f08bbb" font-family="Lexend, Arial, sans-serif" font-size="100" font-weight="900" letter-spacing="-5">
    BACK
  </text>

  <text x="110" y="402" fill="rgba(255,255,255,0.72)" font-family="Lexend, Arial, sans-serif" font-size="30" font-weight="500">
