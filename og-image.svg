    </text>
  </g>

  <g transform="translate(806 130)">
    <rect width="260" height="312" rx="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>

    <text x="34" y="50" fill="rgba(255,255,255,0.36)" font-family="Lexend, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="4">
