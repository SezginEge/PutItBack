<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Put It Back social image</title>
  <desc id="desc">Minimal dark social preview for Put It Back.</desc>

  <rect width="1200" height="630" fill="#050505"/>
  <rect x="58" y="58" width="1084" height="514" rx="32" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>

  <circle cx="200" cy="128" r="8" fill="#f08bbb"/>
  <text x="226" y="136" fill="rgba(255,255,255,0.45)" font-family="Lexend, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="6">
